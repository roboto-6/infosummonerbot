name: infosummonerbot
version: 0.3.0
main: src/main.tsx
description: |
  A customizable summon bot that lets any user call up helpful information by commenting trigger commands (e.g., !caresheet). Unlike mod-only tools, this allows your entire community to share resources with each other.
  
  Features:
  - Any user can summon responses, not just moderators
  - Configure custom responses with full markdown support
  - Flexible pinging (@OP or @above) to notify the right person
  - Customizable summon indicators (!, $, %, etc.)
  - Optional cooldowns and ping limits to prevent spam
  - Multi-subreddit support with independent settings per community
  
  Perfect for empowering your community to share care guides, FAQs, rules, wiki links, and other frequently requested information without mod intervention.